<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>醫生出診追蹤系統</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=JetBrains+Mono&display=swap');
        body { font-family: 'Inter', sans-serif; }
        [x-cloak] { display: none !important; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
        button, input, select, textarea { touch-action: manipulation; }
    </style>
</head>
<body class="bg-[#F5F5F5] text-zinc-900" x-data="dutyApp()" x-init="init()" x-cloak>
    
    <!-- Navigation -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-zinc-200 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-zinc-900 rounded-xl flex items-center justify-center text-white">
                <i data-lucide="clock" size="20"></i>
            </div>
            <h1 class="text-lg sm:text-xl font-black tracking-tighter whitespace-nowrap">醫生出診追蹤</h1>
        </div>
        <div class="flex bg-zinc-100 p-1 rounded-lg">
            <button @click="view = 'schedule'" :class="view === 'schedule' ? 'bg-white shadow-sm text-zinc-900' : 'text-zinc-500'" class="px-3 sm:px-4 py-2 rounded-md text-sm font-medium transition-all flex items-center gap-2">
                <i data-lucide="calendar" size="16"></i>
                <span class="hidden sm:inline">出診表</span>
            </button>
            <button @click="view = 'management'" :class="view === 'management' ? 'bg-white shadow-sm text-zinc-900' : 'text-zinc-500'" class="px-3 sm:px-4 py-2 rounded-md text-sm font-medium transition-all flex items-center gap-2">
                <i data-lucide="users" size="16"></i>
                <span class="hidden sm:inline">醫生管理</span>
            </button>
            <button @click="view = 'data'" :class="view === 'data' ? 'bg-white shadow-sm text-zinc-900' : 'text-zinc-500'" class="px-3 sm:px-4 py-2 rounded-md text-sm font-medium transition-all flex items-center gap-2">
                <i data-lucide="database" size="16"></i>
                <span class="hidden sm:inline">資料</span>
            </button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6">
        <!-- Schedule View -->
        <template x-if="view === 'schedule'">
            <div class="space-y-4">
                <div class="mb-8">
                    <h2 class="text-3xl font-bold tracking-tighter">出診排班表</h2>
                    <p class="text-zinc-500">查看每日各時段出診醫生名單</p>
                </div>

                <div class="grid gap-4">
                    <template x-for="day in upcomingDays" :key="day.dateStr">
                        <div class="bg-white rounded-2xl p-4 sm:p-6 border border-zinc-200 shadow-sm flex flex-col sm:flex-row items-start sm:items-center gap-4 sm:gap-8">
                            <div class="flex flex-row sm:flex-col items-center justify-center min-w-[60px] sm:min-w-[80px] border-b sm:border-b-0 sm:border-r border-zinc-100 pb-4 sm:pb-0 sm:pr-8 w-full sm:w-auto gap-4 sm:gap-0">
                                <span class="text-[12px] sm:text-xs font-mono text-zinc-400" x-text="day.monthNum + '月'"></span>
                                <span class="text-2xl sm:text-3xl font-black tracking-tighter" x-text="day.dayNum"></span>
                                <span class="text-[12px] sm:text-xs font-mono text-zinc-400" x-text="day.weekday"></span>
                            </div>
                            
                            <div class="flex-1 grid grid-cols-1 sm:grid-cols-3 gap-6 w-full">
                                <template x-for="shift in ['morning', 'afternoon', 'night']" :key="shift">
                                    <div class="space-y-2">
                                        <div class="flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest text-zinc-400">
                                            <i data-lucide="clock" size="12"></i>
                                            <span x-text="shift === 'morning' ? '上午診' : shift === 'afternoon' ? '下午診' : '夜診'"></span>
                                        </div>
                                        <div class="flex flex-col gap-1.5">
                                            <template x-for="doc in day.shifts[shift]" :key="doc.doctor_id">
                                                <div class="flex items-center gap-2 px-3 py-2 rounded-xl border border-zinc-100 bg-zinc-50/50">
                                                    <div class="w-2 h-2 rounded-full" :style="'background-color:' + doc.color"></div>
                                                    <span class="text-sm font-medium" x-text="doc.name"></span>
                                                </div>
                                            </template>
                                            <template x-if="day.shifts[shift].length === 0">
                                                <span class="text-zinc-200 italic text-xs pl-1">無</span>
                                            </template>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </template>

        <!-- Management View -->
        <template x-if="view === 'management'">
            <div class="space-y-6">
                <div class="flex gap-3 items-center bg-white p-3 rounded-2xl border border-zinc-200 shadow-sm">
                    <button @click="addDoctor()" class="w-12 h-12 shrink-0 bg-zinc-900 text-white rounded-xl font-bold hover:bg-zinc-800 transition-all flex items-center justify-center shadow-lg shadow-zinc-200">
                        <i data-lucide="plus" size="24"></i>
                    </button>
                    <div class="relative flex-1">
                        <i data-lucide="search" size="18" class="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-400"></i>
                        <input type="text" x-model="searchTerm" placeholder="搜尋醫師姓名..." class="w-full pl-12 pr-4 py-3 bg-zinc-50 border border-zinc-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-zinc-900 transition-all">
                    </div>
                </div>

                <div class="grid gap-4">
                    <template x-for="doc in filteredDoctors" :key="doc.id">
                        <div class="bg-white rounded-2xl p-4 sm:p-6 border border-zinc-200 shadow-sm flex flex-col sm:flex-row items-start sm:items-center justify-between group">
                            <div class="flex items-center gap-4 w-full sm:w-auto">
                                <div class="relative">
                                    <button @click="editingColorId = (editingColorId === doc.id ? null : doc.id)" :style="'background-color:' + doc.color" class="w-12 h-12 rounded-full flex items-center justify-center text-white font-bold text-lg shrink-0 transition-transform hover:scale-110 shadow-sm">
                                        <span x-text="doc.name[0]"></span>
                                    </button>
                                    
                                    <div x-show="editingColorId === doc.id" @click.away="editingColorId = null" class="absolute top-full left-0 mt-2 p-2 bg-white border border-zinc-200 rounded-xl shadow-xl z-50 flex gap-1.5">
                                        <template x-for="c in colors" :key="c">
                                            <button @click="updateDoctorColor(doc.id, c)" :style="'background-color:' + c" :class="doc.color === c ? 'border-zinc-900 scale-110' : 'border-transparent'" class="w-6 h-6 rounded-full border-2 shrink-0 transition-transform hover:scale-110"></button>
                                        </template>
                                    </div>
                                </div>
                                
                                <div class="flex-1">
                                    <template x-if="editingNameId === doc.id">
                                        <input x-model="tempName" @blur="updateDoctorName(doc.id)" @keydown.enter="updateDoctorName(doc.id)" class="bg-zinc-50 border border-zinc-200 rounded-lg px-2 py-1 text-lg font-bold w-full" autofocus>
                                    </template>
                                    <template x-if="editingNameId !== doc.id">
                                        <h4 @click="editingNameId = doc.id; tempName = doc.name" class="font-bold text-lg cursor-pointer hover:text-zinc-600" x-text="doc.name"></h4>
                                    </template>
                                    <div class="text-xs text-zinc-500 mt-1 flex flex-wrap gap-x-2 gap-y-1">
                                        <span x-text="getDoctorScheduleSummary(doc)" class="bg-zinc-100 text-zinc-600 px-2 py-0.5 rounded"></span>
                                    </div>
                                </div>
                            </div>
                            <div class="flex gap-2 w-full sm:w-auto mt-4 sm:mt-0">
                                <button @click="startEditingDates(doc)" class="flex-1 sm:flex-none justify-center p-3 rounded-xl border border-zinc-200 hover:bg-zinc-50 transition-colors text-zinc-600 flex items-center gap-2 text-sm font-medium">
                                    <i data-lucide="calendar" size="18"></i>
                                    設定排班
                                </button>
                                <button @click="deleteConfirmId = doc.id" class="p-3 rounded-xl border border-zinc-200 hover:bg-red-50 hover:text-red-600 hover:border-red-100 transition-colors text-zinc-400">
                                    <i data-lucide="trash-2" size="18"></i>
                                </button>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </template>

        <!-- Data View -->
        <template x-if="view === 'data'">
            <div class="space-y-8">
                <div class="text-center space-y-2">
                    <h2 class="text-3xl font-black tracking-tighter">資料備份與還原</h2>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div class="bg-white rounded-[32px] p-8 border border-zinc-200 shadow-sm hover:shadow-md transition-all flex flex-col items-center text-center space-y-6 h-full">
                        <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center">
                            <i data-lucide="download" size="32"></i>
                        </div>
                        <div class="flex-1 space-y-2">
                            <h3 class="text-xl font-bold">匯出資料</h3>
                        </div>
                        <button @click="exportData()" class="w-full py-4 bg-zinc-900 text-white rounded-2xl font-bold hover:bg-zinc-800 transition-all flex items-center justify-center gap-2">
                            <i data-lucide="download" size="20"></i>
                            立即匯出備份
                        </button>
                    </div>
                    <div class="bg-white rounded-[32px] p-8 border border-zinc-200 shadow-sm hover:shadow-md transition-all flex flex-col items-center text-center space-y-6 h-full">
                        <div class="w-16 h-16 bg-amber-50 text-amber-600 rounded-2xl flex items-center justify-center">
                            <i data-lucide="upload" size="32"></i>
                        </div>
                        <div class="flex-1 space-y-2">
                            <h3 class="text-xl font-bold">還原資料</h3>
                        </div>
                        <label class="w-full cursor-pointer">
                            <input type="file" accept=".json" @change="importData($event)" class="hidden">
                            <div class="w-full py-4 border-2 border-dashed border-zinc-200 rounded-2xl font-bold text-zinc-600 hover:bg-zinc-50 hover:border-zinc-400 transition-all flex items-center justify-center gap-2">
                                <i data-lucide="upload" size="20"></i>
                                選擇備份檔案
                            </div>
                        </label>
                    </div>
                </div>

                <div class="bg-zinc-50 rounded-[24px] p-6 sm:p-8 border border-zinc-200 mt-4">
                    <div class="flex items-center gap-2 mb-4">
                        <i data-lucide="info" size="20" class="text-zinc-500"></i>
                        <h3 class="text-lg font-bold text-zinc-800">注意事項</h3>
                    </div>
                    <ul class="space-y-3 text-zinc-600 text-sm list-decimal list-outside ml-4 marker:text-zinc-400 marker:font-bold">
                        <li class="pl-2">匯出資料：僅包含醫師基本資料與排班日期，不包含系統設定。</li>
                        <li class="pl-2">還原資料：將會刪除目前系統中所有的醫師與排班紀錄，並以備份檔案內容取代。</li>
                        <li class="pl-2">建議在進行重大變更前先執行一次匯出備份。</li>
                    </ul>
                </div>
            </div>
        </template>
    </main>

    <!-- Modals -->
    <div x-show="editingDoctor" class="fixed inset-0 z-[100] flex items-center justify-center p-6" x-transition x-cloak>
        <div @click="editingDoctor = null" class="absolute inset-0 bg-zinc-900/40 backdrop-blur-sm"></div>
        <div class="relative bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden">
            <div class="p-8 border-b border-zinc-100 flex justify-between items-center">
                <div>
                    <h3 class="text-2xl font-bold tracking-tight" x-text="editingDoctor?.name + ' 的排班'"></h3>
                </div>
                <button @click="editingDoctor = null" class="p-2 hover:bg-zinc-100 rounded-full transition-colors"><i data-lucide="x" size="24"></i></button>
            </div>
            <div class="p-8 space-y-6">
                <div class="flex bg-zinc-100 p-1 rounded-xl">
                    <template x-for="s in ['morning', 'afternoon', 'night']" :key="s">
                        <button @click="currentShift = s" :class="currentShift === s ? 'bg-white shadow-sm text-zinc-900' : 'text-zinc-400'" class="flex-1 py-2 rounded-lg text-[10px] font-bold" x-text="s === 'morning' ? '上午診' : s === 'afternoon' ? '下午診' : '夜診'"></button>
                    </template>
                </div>
                <div class="flex bg-zinc-100 p-1 rounded-xl">
                    <button @click="modalTab = 'manual'" :class="modalTab === 'manual' ? 'bg-white shadow-sm text-zinc-900' : 'text-zinc-400'" class="flex-1 py-2 rounded-lg text-xs font-bold">自行指定日期</button>
                    <button @click="modalTab = 'recurring'" :class="modalTab === 'recurring' ? 'bg-white shadow-sm text-zinc-900' : 'text-zinc-400'" class="flex-1 py-2 rounded-lg text-xs font-bold">固定每週</button>
                </div>

                <div x-show="modalTab === 'manual'">
                    <div class="flex items-center justify-between mb-4">
                        <span class="font-bold" x-text="currentMonthLabel"></span>
                        <div class="flex gap-2">
                            <button @click="changeMonth(-1)" class="p-1 border rounded hover:bg-zinc-50"><i data-lucide="chevron-left" size="16"></i></button>
                            <button @click="changeMonth(1)" class="p-1 border rounded hover:bg-zinc-50"><i data-lucide="chevron-right" size="16"></i></button>
                        </div>
                    </div>
                    <div class="calendar-grid gap-1">
                        <template x-for="day in weekDays" :key="day">
                            <div class="text-center text-[10px] font-bold text-zinc-400 py-1" x-text="day"></div>
                        </template>
                        <template x-for="dateObj in calendarDays" :key="dateObj ? dateObj.dateStr : Math.random()">
                            <div class="aspect-square">
                                <template x-if="dateObj">
                                    <button @click="toggleEntry(dateObj.dateStr)" 
                                            :class="isEntrySelected(dateObj.dateStr) ? 'bg-zinc-900 text-white shadow-lg scale-105' : 'hover:bg-zinc-100 text-zinc-700'"
                                            class="w-full h-full rounded-lg text-xs font-medium transition-all"
                                            x-text="dateObj.day"></button>
                                </template>
                            </div>
                        </template>
                    </div>
                </div>

                <div x-show="modalTab === 'recurring'">
                    <div class="calendar-grid gap-1">
                        <template x-for="(day, idx) in weekDays" :key="idx">
                            <button @click="toggleRecurringDay(idx)"
                                    :class="isRecurringSelected(idx) ? 'bg-zinc-900 text-white shadow-lg' : 'border border-zinc-100 hover:bg-zinc-50 text-zinc-700'"
                                    class="aspect-square rounded-xl flex items-center justify-center text-sm font-medium transition-all"
                                    x-text="day"></button>
                        </template>
                    </div>
                </div>

                <button @click="saveSettings()" class="w-full py-4 bg-zinc-900 text-white rounded-2xl font-bold hover:bg-zinc-800 transition-all flex items-center justify-center gap-2">
                    <i data-lucide="check" size="20"></i>
                    儲存設定
                </button>
            </div>
        </div>
    </div>

    <!-- Delete Modal -->
    <div x-show="deleteConfirmId" class="fixed inset-0 z-[110] flex items-center justify-center p-6" x-transition x-cloak>
        <div @click="deleteConfirmId = null" class="absolute inset-0 bg-zinc-900/60 backdrop-blur-md"></div>
        <div class="relative bg-white w-full max-w-sm rounded-[32px] p-8 text-center shadow-2xl">
            <div class="w-20 h-20 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6">
                <i data-lucide="trash-2" size="40"></i>
            </div>
            <h3 class="text-2xl font-black mb-2">確定要刪除嗎？</h3>
            <p class="text-zinc-500 text-sm mb-8">此操作無法復原。</p>
            <div class="flex flex-col gap-3">
                <button @click="deleteDoctor(deleteConfirmId)" class="w-full py-4 bg-red-600 text-white rounded-2xl font-bold hover:bg-red-700 transition-colors">確認刪除</button>
                <button @click="deleteConfirmId = null" class="w-full py-4 bg-zinc-100 text-zinc-600 rounded-2xl font-bold hover:bg-zinc-200 transition-colors">取消</button>
            </div>
        </div>
    </div>

    <script>
        function dutyApp() {
            return {
                view: 'schedule',
                doctors: [],
                schedules: [],
                searchTerm: '',
                editingDoctor: null,
                editingNameId: null,
                editingColorId: null,
                deleteConfirmId: null,
                tempName: '',
                currentShift: 'morning',
                modalTab: 'manual',
                currentMonth: new Date(),
                selectedEntries: [],
                recurringDays: [],
                weekDays: ['日', '一', '二', '三', '四', '五', '六'],
                colors: ['#ef4444', '#f97316', '#facc15', '#22c55e', '#3b82f6', '#6366f1', '#a855f7', '#000000'],

                init() {
                    const savedDocs = localStorage.getItem('duty_doctors');
                    const savedScheds = localStorage.getItem('duty_schedules');
                    if (savedDocs) this.doctors = JSON.parse(savedDocs);
                    if (savedScheds) this.schedules = JSON.parse(savedScheds);
                    this.$nextTick(() => lucide.createIcons());
                    
                    // Watch for view changes to re-render icons
                    this.$watch('view', () => this.$nextTick(() => lucide.createIcons()));
                    this.$watch('editingDoctor', () => this.$nextTick(() => lucide.createIcons()));
                    this.$watch('deleteConfirmId', () => this.$nextTick(() => lucide.createIcons()));
                },

                save() {
                    localStorage.setItem('duty_doctors', JSON.stringify(this.doctors));
                    localStorage.setItem('duty_schedules', JSON.stringify(this.schedules));
                },

                get filteredDoctors() {
                    if (!this.searchTerm) return this.doctors;
                    return this.doctors.filter(d => d.name.toLowerCase().includes(this.searchTerm.toLowerCase()));
                },

                get upcomingDays() {
                    const days = [];
                    const today = new Date();
                    today.setHours(0,0,0,0);
                    for (let i = 0; i < 30; i++) {
                        const d = new Date(today);
                        d.setDate(today.getDate() + i);
                        const dateStr = this.formatDate(d);
                        const dayOfWeek = d.getDay();
                        
                        const shifts = { morning: [], afternoon: [], night: [] };
                        
                        // Manual
                        this.schedules.filter(s => s.date === dateStr).forEach(s => {
                            shifts[s.shift || 'morning'].push(s);
                        });

                        // Recurring
                        this.doctors.forEach(doc => {
                            (doc.recurring_days || []).forEach(rd => {
                                if (rd.day === dayOfWeek) {
                                    if (!shifts[rd.shift].some(s => s.doctor_id === doc.id)) {
                                        shifts[rd.shift].push({ name: doc.name, color: doc.color, doctor_id: doc.id });
                                    }
                                }
                            });
                        });

                        days.push({
                            dateStr,
                            dayNum: d.getDate(),
                            monthNum: d.getMonth() + 1,
                            weekday: this.weekDays[dayOfWeek],
                            shifts
                        });
                    }
                    return days;
                },

                addDoctor() {
                    const id = Date.now();
                    this.doctors.unshift({ id, name: '新醫師', color: '#3b82f6', recurring_days: [] });
                    this.save();
                    this.editingNameId = id;
                    this.tempName = '';
                    this.$nextTick(() => lucide.createIcons());
                },

                updateDoctorName(id) {
                    if (this.tempName.trim()) {
                        const doc = this.doctors.find(d => d.id === id);
                        if (doc) {
                            doc.name = this.tempName;
                            // Update name in existing schedules
                            this.schedules = this.schedules.map(s => s.doctor_id === id ? { ...s, name: this.tempName } : s);
                        }
                        this.save();
                    }
                    this.editingNameId = null;
                },

                updateDoctorColor(id, color) {
                    const doc = this.doctors.find(d => d.id === id);
                    if (doc) {
                        doc.color = color;
                        // Update color in existing schedules
                        this.schedules = this.schedules.map(s => s.doctor_id === id ? { ...s, color: color } : s);
                    }
                    this.save();
                    this.editingColorId = null;
                },

                deleteDoctor(id) {
                    this.doctors = this.doctors.filter(d => d.id !== id);
                    this.schedules = this.schedules.filter(s => s.doctor_id !== id);
                    this.save();
                    this.deleteConfirmId = null;
                },

                startEditingDates(doc) {
                    this.editingDoctor = doc;
                    this.recurringDays = [...(doc.recurring_days || [])];
                    this.selectedEntries = this.schedules
                        .filter(s => s.doctor_id === doc.id)
                        .map(s => ({ date: s.date, shift: s.shift }));
                    this.modalTab = 'manual';
                    this.$nextTick(() => lucide.createIcons());
                },

                isEntrySelected(dateStr) {
                    return this.selectedEntries.some(e => e.date === dateStr && e.shift === this.currentShift);
                },

                toggleEntry(dateStr) {
                    const idx = this.selectedEntries.findIndex(e => e.date === dateStr && e.shift === this.currentShift);
                    if (idx > -1) this.selectedEntries.splice(idx, 1);
                    else this.selectedEntries.push({ date: dateStr, shift: this.currentShift });
                },

                isRecurringSelected(dayIdx) {
                    return this.recurringDays.some(rd => rd.day === dayIdx && rd.shift === this.currentShift);
                },

                toggleRecurringDay(dayIdx) {
                    const idx = this.recurringDays.findIndex(rd => rd.day === dayIdx && rd.shift === this.currentShift);
                    if (idx > -1) this.recurringDays.splice(idx, 1);
                    else this.recurringDays.push({ day: dayIdx, shift: this.currentShift });
                },

                saveSettings() {
                    const doc = this.doctors.find(d => d.id === this.editingDoctor.id);
                    doc.recurring_days = [...this.recurringDays];
                    
                    const otherScheds = this.schedules.filter(s => s.doctor_id !== doc.id);
                    const newScheds = this.selectedEntries.map(e => ({
                        ...e, doctor_id: doc.id, name: doc.name, color: doc.color
                    }));
                    this.schedules = [...otherScheds, ...newScheds];
                    this.save();
                    this.editingDoctor = null;
                },

                get currentMonthLabel() {
                    return this.currentMonth.getFullYear() + '年 ' + (this.currentMonth.getMonth() + 1) + '月';
                },

                get calendarDays() {
                    const year = this.currentMonth.getFullYear();
                    const month = this.currentMonth.getMonth();
                    const first = new Date(year, month, 1).getDay();
                    const last = new Date(year, month + 1, 0).getDate();
                    const days = [];
                    for (let i = 0; i < first; i++) days.push(null);
                    for (let i = 1; i <= last; i++) {
                        const d = new Date(year, month, i);
                        days.push({ day: i, dateStr: this.formatDate(d) });
                    }
                    return days;
                },

                changeMonth(n) {
                    this.currentMonth = new Date(this.currentMonth.setMonth(this.currentMonth.getMonth() + n));
                },

                formatDate(d) {
                    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
                },

                getDoctorScheduleSummary(doc) {
                    const recCount = (doc.recurring_days || []).length;
                    const manCount = this.schedules.filter(s => s.doctor_id === doc.id).length;
                    if (recCount === 0 && manCount === 0) return '尚未排班';
                    return `固定 ${recCount} 診 / 指定 ${manCount} 診`;
                },

                exportData() {
                    const data = { doctors: this.doctors, schedules: this.schedules };
                    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'duty_schedule_backup.json';
                    a.click();
                },

                importData(e) {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        try {
                            const data = JSON.parse(ev.target.result);
                            if (data.doctors && data.schedules) {
                                this.doctors = data.doctors;
                                this.schedules = data.schedules;
                                this.save();
                                alert('匯入成功');
                                window.location.reload();
                            } else {
                                alert('無效的備份檔案');
                            }
                        } catch (err) {
                            alert('解析檔案失敗');
                        }
                    };
                    reader.readAsText(file);
                }
            }
        }
    </script>
</body>
